<script>
// ═══════════════════════════════════════════════════════════
//  STORAGE HELPERS
// ═══════════════════════════════════════════════════════════
const KEYS = { SETTINGS: 'kal_settings', LOG: 'kal_log', FAVORITES: 'kal_favs', WEIGHT: 'kal_weight', LEBENSMITTEL: 'kal_lm' };

const DEFAULT_SETTINGS = { kcal: 2000, protein: 150, carbs: 220, fat: 65 };

const NUTRIENT_KEYS = ['kalorien','kalorien_kj','protein','fett','kohlenhydrate','zucker','salz','ballaststoffe','wasser','natrium','kalium','calcium','magnesium','eisen','zink','vitamin_c','cholesterin'];
const NUTRIENT_LABELS = { kalorien:'Kalorien', kalorien_kj:'Energie (kJ)', protein:'Protein', fett:'Fett', kohlenhydrate:'Kohlenhydrate', zucker:'Zucker', salz:'Salz', ballaststoffe:'Ballaststoffe', wasser:'Wasser', natrium:'Natrium', kalium:'Kalium', calcium:'Calcium', magnesium:'Magnesium', eisen:'Eisen', zink:'Zink', vitamin_c:'Vitamin C', cholesterin:'Cholesterin' };
const NUTRIENT_UNITS = { kalorien:'kcal', kalorien_kj:'kJ', protein:'g', fett:'g', kohlenhydrate:'g', zucker:'g', salz:'g', ballaststoffe:'g', wasser:'g', natrium:'mg', kalium:'mg', calcium:'mg', magnesium:'mg', eisen:'mg', zink:'mg', vitamin_c:'mg', cholesterin:'mg' };
const NUTRIENT_EXT_KEYS = ['kalorien_kj','zucker','salz','ballaststoffe','wasser','natrium','kalium','calcium','magnesium','eisen','zink','vitamin_c','cholesterin'];

function loadSettings() {
  try { return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(KEYS.SETTINGS) || '{}') }; }
  catch { return { ...DEFAULT_SETTINGS }; }
}
function saveSettingsData(s) { localStorage.setItem(KEYS.SETTINGS, JSON.stringify(s)); }

function loadLog() {
  try { return JSON.parse(localStorage.getItem(KEYS.LOG) || '{}'); }
  catch { return {}; }
}
function saveLogData(log) { localStorage.setItem(KEYS.LOG, JSON.stringify(log)); }

function loadFavorites() {
  try { return JSON.parse(localStorage.getItem(KEYS.FAVORITES) || '[]'); }
  catch { return []; }
}
function saveFavorites(favs) { localStorage.setItem(KEYS.FAVORITES, JSON.stringify(favs)); }
function isFavorite(name) { return loadFavorites().some(f => f.name === name); }
function toggleFavorite(food) {
  let favs = loadFavorites();
  const idx = favs.findIndex(f => f.name === food.name);
  if (idx >= 0) { favs.splice(idx, 1); showToast('Favorit entfernt', '#64748b'); }
  else { favs.unshift({ ...food, isFav: true }); showToast('❤️ Als Favorit gespeichert', '#e11d48'); }
  saveFavorites(favs);
}

function loadWeightLog() {
  try { return JSON.parse(localStorage.getItem(KEYS.WEIGHT) || '[]'); }
  catch { return []; }
}
function saveWeightLog(log) { localStorage.setItem(KEYS.WEIGHT, JSON.stringify(log)); }
function addWeightEntry(kg) {
  const log = loadWeightLog();
  const today = getToday();
  const filtered = log.filter(e => e.date !== today);
  filtered.unshift({ date: today, kg });
  saveWeightLog(filtered.slice(0, 90));
  const sb = getSB();
  if (sb) sb.from('gewicht').upsert({ datum: today, gewicht_kg: kg }, { onConflict: 'datum' }).catch(() => {});
}
function deleteWeightEntry(date) {
  saveWeightLog(loadWeightLog().filter(e => e.date !== date));
  const sb = getSB();
  if (sb) sb.from('gewicht').delete().eq('datum', date).catch(() => {});
}

function getToday() { return new Date().toISOString().slice(0, 10); }

function getTodayMeals() { return loadLog()[getToday()] || []; }

function addMealToLog(meal) {
  const log = loadLog();
  const d = getToday();
  if (!log[d]) log[d] = [];
  const localId = Date.now() + Math.random();
  log[d].unshift({ id: localId, sbId: null, ...meal });
  saveLogData(log);
  S.dashNutrients = null; // invalidate cached extended nutrients
  addEintragToSupabase(meal, localId).catch(() => {});
}

async function deleteMealFromLog(id) {
  const log = loadLog();
  const d = getToday();
  if (log[d]) {
    const entry = log[d].find(m => m.id === id);
    log[d] = log[d].filter(m => m.id !== id);
    saveLogData(log);
    S.dashNutrients = null;
    if (entry?.sbId) {
      const sb = getSB();
      if (sb) await sb.from('eintraege').delete().eq('id', entry.sbId);
    }
  }
}

function getSB() {
  if (!_sb && window.supabase) _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return _sb;
}

function getLebensmittelCache() {
  try { return JSON.parse(localStorage.getItem(KEYS.LEBENSMITTEL) || '[]'); }
  catch { return []; }
}

async function syncLebensmittelCache() {
  // No longer pre-loading all foods — Supabase is queried directly on search
  // Just verify connectivity and seed if truly empty
  const sb = getSB(); if (!sb) return;
  try {
    const { data } = await sb.from('lebensmittel').select('id').limit(1);
    if (data && data.length === 0) await seedLebensmittel();
  } catch(e) {}
}

async function seedLebensmittel() {
  const sb = getSB(); if (!sb) return;
  try {
    const rows = NATURAL_FOODS.map(f => ({
      name: f.name, kalorien: f.kcal100, protein: f.protein100,
      fett: f.fat100, kohlenhydrate: f.carbs100, zucker: 0, salz: 0,
    }));
    for (let i = 0; i < rows.length; i += 50)
      await sb.from('lebensmittel').insert(rows.slice(i, i + 50));
    const { data } = await sb.from('lebensmittel').select('*');
    if (data) localStorage.setItem(KEYS.LEBENSMITTEL, JSON.stringify(data));
  } catch(e) { console.warn('Seed failed:', e); }
}

async function findOrCreateLebensmittel(meal) {
  const sb = getSB(); if (!sb) return null;
  try {
    const g = meal.grams || 100; const ratio = g / 100;
    const kcal100  = meal.kcal100    ?? Math.round((meal.kcal    || 0) / ratio);
    const prot100  = meal.protein100 ?? +((meal.protein || 0) / ratio).toFixed(1);
    const carbs100 = meal.carbs100   ?? +((meal.carbs   || 0) / ratio).toFixed(1);
    const fat100   = meal.fat100     ?? +((meal.fat     || 0) / ratio).toFixed(1);
    const cache = getLebensmittelCache();
    const cached = cache.find(l => l.name.toLowerCase() === meal.name.toLowerCase());
    if (cached) return cached.id;
    const { data: found } = await sb.from('lebensmittel').select('id').ilike('name', meal.name).limit(1);
    if (found && found.length > 0) return found[0].id;
    const { data: created } = await sb.from('lebensmittel').insert({
      name: meal.name, kalorien: kcal100, protein: prot100,
      fett: fat100, kohlenhydrate: carbs100, zucker: 0, salz: 0,
    }).select('id').single();
    return created?.id ?? null;
  } catch(e) { return null; }
}

async function addEintragToSupabase(meal, localId) {
  const sb = getSB(); if (!sb) return;
  try {
    const lmId = meal.lmId || await findOrCreateLebensmittel(meal);
    if (!lmId) return;
    const { data } = await sb.from('eintraege').insert({
      date: getToday(), lebensmittel_id: lmId, menge_gramm: meal.grams || 100,
    }).select('id').single();
    if (data?.id) {
      const log = loadLog(); const d = getToday();
      if (log[d]) { const e = log[d].find(x => x.id === localId); if (e) { e.sbId = data.id; e.lmId = lmId; saveLogData(log); } }
    }
  } catch(e) {}
}

async function syncTodayFromSupabase() {
  const sb = getSB(); if (!sb) return;
  try {
    const today = getToday();
    const { data: eintraege, error } = await sb.from('eintraege')
      .select('id, menge_gramm, lebensmittel_id')
      .eq('date', today).order('id', { ascending: false });
    if (error || !eintraege || eintraege.length === 0) return;
    const lmIds = [...new Set(eintraege.map(e => e.lebensmittel_id))];
    const { data: lmData } = await sb.from('lebensmittel')
      .select('id, name, kalorien, protein, fett, kohlenhydrate')
      .in('id', lmIds);
    const lmMap = Object.fromEntries((lmData||[]).map(l => [l.id, l]));
    const meals = eintraege.map(e => {
      const g = e.menge_gramm || 100; const f = g / 100; const l = lmMap[e.lebensmittel_id] || {};
      return { id: e.id, sbId: e.id, lmId: e.lebensmittel_id, name: l.name || '',
        kcal: Math.round((l.kalorien||0)*f), protein: +((l.protein||0)*f).toFixed(1),
        carbs: +((l.kohlenhydrate||0)*f).toFixed(1), fat: +((l.fett||0)*f).toFixed(1), grams: g,
        kcal100: l.kalorien||0, protein100: l.protein||0, carbs100: l.kohlenhydrate||0, fat100: l.fett||0 };
    });
    const log = loadLog(); log[today] = meals; saveLogData(log); render();
  } catch(e) {}
}

async function syncWeightFromSupabase() {
  const sb = getSB(); if (!sb) return;
  try {
    const { data, error } = await sb.from('gewicht')
      .select('datum, gewicht_kg').order('datum', { ascending: false }).limit(90);
    if (error || !data) return;
    saveWeightLog(data.map(e => ({ date: e.datum, kg: e.gewicht_kg })));
    render();
  } catch(e) {}
}

async function initSupabase() {
  try {
    getSB();
    await Promise.all([syncLebensmittelCache(), syncTodayFromSupabase(), syncWeightFromSupabase()]);
  } catch(e) { console.warn('Supabase init failed:', e); }
}

function getTotals(meals) {
  return meals.reduce((a, m) => ({
    kcal:    a.kcal    + (+m.kcal    || 0),
    protein: a.protein + (+m.protein || 0),
    carbs:   a.carbs   + (+m.carbs   || 0),
    fat:     a.fat     + (+m.fat     || 0),
  }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
}

async function calcAllNutrients(meals) {
  const result = Object.fromEntries(NUTRIENT_KEYS.map(k => [k, 0]));
  const sb = getSB();
  const lmIds = meals.filter(m => m.lmId).map(m => m.lmId);
  let lmExtended = {};
  if (sb && lmIds.length > 0) {
    const { data } = await sb.from('lebensmittel')
      .select('id,' + NUTRIENT_KEYS.join(','))
      .in('id', lmIds);
    if (data) lmExtended = Object.fromEntries(data.map(r => [r.id, r]));
  }
  for (const meal of meals) {
    const factor = (meal.grams || 100) / 100;
    const ext = lmExtended[meal.lmId] || {};
    result.kalorien      += (ext.kalorien      ?? meal.kcal100    ?? 0) * factor;
    result.protein       += (ext.protein       ?? meal.protein100 ?? 0) * factor;
    result.fett          += (ext.fett          ?? meal.fat100     ?? 0) * factor;
    result.kohlenhydrate += (ext.kohlenhydrate ?? meal.carbs100   ?? 0) * factor;
    for (const k of NUTRIENT_EXT_KEYS) {
      if (ext[k] != null) result[k] += ext[k] * factor;
    }
  }
  for (const k of NUTRIENT_KEYS) result[k] = +result[k].toFixed(1);
  return result;
}

function getWeekDates(refDate) {
  const d = new Date(refDate + 'T12:00:00');
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - ((day + 6) % 7));
  return Array.from({length: 7}, (_, i) => {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    return dd.toISOString().slice(0, 10);
  });
}

async function loadDayData(date) {
  S.historyDate = date;
  S.historyLoading = true;
  S.historyData = null;
  render();
  try {
    const log = loadLog();
    let meals = log[date] ? [...log[date]] : [];
    const sb = getSB();
    if (sb) {
      const { data: eintraege } = await sb.from('eintraege')
        .select('id, menge_gramm, lebensmittel_id')
        .eq('date', date).order('id', { ascending: false });
      if (eintraege && eintraege.length > 0) {
        const lmIds = [...new Set(eintraege.map(e => e.lebensmittel_id))];
        const { data: lmData } = await sb.from('lebensmittel')
          .select('id, name, kalorien, protein, fett, kohlenhydrate').in('id', lmIds);
        const lmMap = Object.fromEntries((lmData||[]).map(l => [l.id, l]));
        meals = eintraege.map(e => {
          const g = e.menge_gramm || 100; const f = g / 100; const l = lmMap[e.lebensmittel_id] || {};
          return { id: e.id, sbId: e.id, lmId: e.lebensmittel_id, name: l.name || '', grams: g,
            kcal: Math.round((l.kalorien||0)*f), protein: +((l.protein||0)*f).toFixed(1),
            carbs: +((l.kohlenhydrate||0)*f).toFixed(1), fat: +((l.fett||0)*f).toFixed(1),
            kcal100: l.kalorien||0, protein100: l.protein||0, carbs100: l.kohlenhydrate||0, fat100: l.fett||0 };
        });
      }
    }
    S.historyData = { meals, nutrients: await calcAllNutrients(meals) };
  } catch(e) {
    S.historyData = { meals: [], nutrients: Object.fromEntries(NUTRIENT_KEYS.map(k => [k, 0])) };
  }
  S.historyLoading = false;
  render();
}

async function loadWeekData(date) {
  S.historyDate = date;
  S.historyLoading = true;
  S.historyWeekData = null;
  render();
  try {
    const dates = getWeekDates(date);
    const log = loadLog();
    const sb = getSB();
    let eintraegeByDate = {};
    if (sb) {
      const { data } = await sb.from('eintraege')
        .select('id, menge_gramm, lebensmittel_id, date')
        .gte('date', dates[0]).lte('date', dates[6]);
      if (data && data.length > 0) {
        const lmIds = [...new Set(data.map(e => e.lebensmittel_id))];
        let lmMap = {};
        if (lmIds.length > 0) {
          const { data: lmData } = await sb.from('lebensmittel')
            .select('id, name, kalorien, protein, fett, kohlenhydrate').in('id', lmIds);
          lmMap = Object.fromEntries((lmData||[]).map(l => [l.id, l]));
        }
        for (const e of data) {
          if (!eintraegeByDate[e.date]) eintraegeByDate[e.date] = [];
          const g = e.menge_gramm||100; const f=g/100; const l=lmMap[e.lebensmittel_id]||{};
          eintraegeByDate[e.date].push({ id:e.id, sbId:e.id, lmId:e.lebensmittel_id, name:l.name||'', grams:g,
            kcal:Math.round((l.kalorien||0)*f), protein:+((l.protein||0)*f).toFixed(1),
            carbs:+((l.kohlenhydrate||0)*f).toFixed(1), fat:+((l.fett||0)*f).toFixed(1),
            kcal100:l.kalorien||0, protein100:l.protein||0, carbs100:l.kohlenhydrate||0, fat100:l.fett||0 });
        }
      }
    }
    const weightLog = loadWeightLog();
    S.historyWeekData = dates.map(d => {
      const meals = eintraegeByDate[d] || log[d] || [];
      const totals = getTotals(meals);
      const w = weightLog.find(e => e.date === d);
      return { date: d, meals, totals, weight: w?.kg ?? null };
    });
  } catch(e) {
    S.historyWeekData = getWeekDates(date).map(d => ({ date: d, meals: [], totals: { kcal:0, protein:0, carbs:0, fat:0 }, weight: null }));
  }
  S.historyLoading = false;
  render();
}

// ═══════════════════════════════════════════════════════════
//  LOKALE SUCHE
// ═══════════════════════════════════════════════════════════
function searchLocalFoods(query) {
  // Offline fallback: search NATURAL_FOODS when Supabase is unavailable
  const q = query.toLowerCase().trim();
  const terms = q.split(/\s+/);
  return NATURAL_FOODS
    .map(food => {
      const haystack = (food.name + ' ' + food.tags).toLowerCase();
      const score = terms.reduce((s, t) => {
        if (food.name.toLowerCase().startsWith(t)) return s + 3;
        if (food.name.toLowerCase().includes(t))   return s + 2;
        if (haystack.includes(t))                  return s + 1;
        return s;
      }, 0);
      return { food, score };
    })
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 8)
    .map(x => x.food);
}

async function searchSupabase(query) {
  const sb = getSB(); if (!sb) return [];
  try {
    const terms = query.trim().split(/\s+/);
    // Build ilike filter for each term (all must match)
    let q = sb.from('lebensmittel')
      .select('id, name, kalorien, protein, fett, kohlenhydrate, quelle')
      .limit(12);
    for (const t of terms) q = q.ilike('name', `*${t}*`);
    const { data, error } = await q;
    if (error || !data) return [];
    return data.map(row => ({
      id: row.id, sbId: row.id, name: row.name,
      kcal100: row.kalorien ?? 0, protein100: row.protein ?? 0,
      carbs100: row.kohlenhydrate ?? 0, fat100: row.fett ?? 0,
      local: true, brand: row.quelle === 'BLS' ? 'BLS 4.0' : '',
      serving: 100, tags: '',
    }));
  } catch(e) { return []; }
}

// ═══════════════════════════════════════════════════════════
//  OPEN FOOD FACTS API
// ═══════════════════════════════════════════════════════════
async function searchFoods(query) {
  const url = `https://world.openfoodfacts.org/api/v2/search?`
    + `search_terms=${encodeURIComponent(query)}&page_size=20`
    + `&fields=product_name,brands,nutriments,serving_quantity&json=1`;
  const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
  const d = await r.json();
  return (d.products || [])
    .filter(p => {
      const n = p.nutriments;
      return p.product_name && n &&
        (n['energy-kcal_100g'] != null || n['energy_100g'] != null);
    })
    .map(p => {
      const n = p.nutriments;
      const kcal100 = +(n['energy-kcal_100g'] ?? (n['energy_100g'] ?? 0) / 4.184).toFixed(1);
      return {
        name:      p.product_name.trim(),
        brand:     (p.brands || '').split(',')[0].trim(),
        kcal100,
        protein100: +(n.proteins_100g        || 0).toFixed(1),
        carbs100:   +(n.carbohydrates_100g   || 0).toFixed(1),
        fat100:     +(n.fat_100g             || 0).toFixed(1),
        serving:    +(p.serving_quantity     || 100),
      };
    });
}

function showToast(msg, color = '#4f46e5') {
  const el = document.createElement('div');
  el.className = 'toast-enter text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-2xl';
  el.style.background = color;
  el.textContent = msg;
  const c = document.getElementById('toast-container');
  c.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

function h(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function num(n, dec = 0) { return dec ? +(+n).toFixed(dec) : Math.round(+n); }
function pct(v, max) { return Math.min(v / Math.max(max, 1), 1); }

function $(id) { return document.getElementById(id); }
function qs(s)  { return document.querySelector(s); }

function render() {
  const app = document.getElementById('app');
  app.innerHTML =
    renderView()
    + renderBottomNav()
    + (S.showFoodModal   ? renderFoodModal()   : '')
    + (S.showManualModal ? renderManualModal() : '')
    + (S.showEditModal   ? renderEditModal()   : '');
  bind();
}

// ─── VIEWS ─────────────────────────────────────────────────
function renderView() {
  if (S.view === 'dashboard') return renderDashboard();
  if (S.view === 'search')    return renderSearch();
  if (S.view === 'settings')  return renderSettings();
  if (S.view === 'weight')    return renderWeightView();
  if (S.view === 'history') {
    if (S.historyMode === 'day' && !S.historyData && !S.historyLoading) {
      S.historyLoading = true;
      setTimeout(() => loadDayData(S.historyDate), 0);
    } else if (S.historyMode === 'week' && !S.historyWeekData && !S.historyLoading) {
      S.historyLoading = true;
      setTimeout(() => loadWeekData(S.historyDate), 0);
    }
    return renderHistory();
  }
  return '';
}

          class="btn-active shrink-0 text-xs font-semibold px-3 py-1.5 rounded-xl transition-colors
            ${todayWeight ? 'text-emerald-400 bg-emerald-400/10' : 'bg-slate-700 hover:bg-slate-600 text-slate-300'}">
          ${todayWeight ? '✓ ' + todayWeight.kg + ' kg' : 'Speichern'}
        </button>
      </div>
    </div>

    <!-- Macro Bars -->
    <div class="mx-4 mt-2.5 grid grid-cols-3 gap-2">
      ${macroCard('Protein',  num(totals.protein,1), sg.protein,  '#818cf8', 'g')}
      ${macroCard('Kohlenhydr.', num(totals.carbs,1), sg.carbs, '#34d399', 'g')}
      ${macroCard('Fett',     num(totals.fat,1),    sg.fat,     '#fb923c', 'g')}
    </div>

    <!-- Extended Nutrients Expandable -->
    <div class="mx-4 mt-2.5">
      <button id="dash-expand-btn"
        class="btn-active w-full bg-slate-800/70 border border-slate-700/30 rounded-2xl px-4 py-2.5 flex items-center justify-between transition-colors hover:border-slate-600/50">
        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Erweiterte Nährwerte</span>
        <svg class="chevron-anim ${S.dashExpanded ? 'chevron-rot' : ''}" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
      </button>
      ${S.dashExpanded ? `
      <div class="mt-1 bg-slate-800/70 rounded-2xl p-4 border border-slate-700/30 slide-in">
        ${S.dashNutrients === null
          ? `<div class="flex items-center justify-center gap-2 py-1">
              <div class="w-3.5 h-3.5 rounded-full border border-indigo-500 border-t-transparent spin"></div>
              <span class="text-slate-500 text-xs">Lade Nährwerte…</span>
             </div>`
          : (() => {
              const visible = NUTRIENT_EXT_KEYS.filter(k => S.dashNutrients[k] > 0);
              return visible.length === 0
                ? `<p class="text-slate-600 text-xs text-center py-1">Keine erweiterten Daten – füge BLS-Lebensmittel hinzu.</p>`
                : `<div class="grid grid-cols-2 gap-x-4 gap-y-1.5">
                    ${visible.map(k => `
                      <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-xs">${NUTRIENT_LABELS[k]}</span>
                        <span class="font-semibold text-slate-300 text-xs">${num(S.dashNutrients[k],1)} ${NUTRIENT_UNITS[k]}</span>
                      </div>`).join('')}
                   </div>`;
            })()
        }
      </div>` : ''}
    </div>

    <!-- Meals Section -->
    <div class="mx-4 mt-4">
      <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2.5">Heutige Mahlzeiten</p>
      ${meals.length === 0
        ? `<div class="bg-slate-800/50 rounded-2xl p-8 text-center border border-slate-700/30">
            <div class="text-4xl mb-2">🥗</div>
            <p class="text-slate-400 text-sm font-medium">Noch keine Einträge</p>
            <p class="text-slate-600 text-xs mt-1">Tippe auf „Eintrag" oder suche Lebensmittel</p>
           </div>`
        : `<div class="space-y-2 slide-in">${meals.map(renderMealRow).join('')}</div>`
      }
    </div>

  </div>`;
}

function macroCard(label, val, goal, color, unit) {
  const p = pct(val, goal);
  const over = val > goal;
  return `
  <div class="bg-slate-800/70 rounded-2xl p-3 border border-slate-700/30">
    <p class="text-slate-500 text-xs mb-2 truncate">${label}</p>
    <div class="h-1.5 bg-slate-700 rounded-full overflow-hidden mb-2">
      <div class="macro-fill h-full rounded-full"
        style="width:${(p*100).toFixed(1)}%;background:${over?'#ef4444':color}"></div>
    </div>
    <p class="font-black text-base leading-none" style="color:${over?'#ef4444':color}">${val}<span class="text-xs font-normal text-slate-500">${unit}</span></p>
    <p class="text-slate-600 text-xs mt-0.5">/ ${goal}${unit}</p>
  </div>`;
}

function renderMealRow(m) {
  return `
  <div class="bg-slate-800/70 rounded-2xl px-4 py-3 flex items-center gap-3 border border-slate-700/30 slide-in">
    <div class="flex-1 min-w-0">
      <p class="font-semibold text-sm leading-snug truncate">${h(m.name)}</p>
      <div class="flex items-center gap-2 mt-0.5">
        <span class="text-amber-400 text-xs font-semibold">${num(m.kcal)} kcal</span>
        ${m.grams ? `<span class="text-slate-600 text-xs">·</span><span class="text-slate-500 text-xs">${m.grams} g</span>` : ''}
      </div>
      <div class="flex gap-3 mt-1">
        <span class="text-xs text-indigo-400">P ${num(m.protein,1)}g</span>
        <span class="text-xs text-emerald-400">K ${num(m.carbs,1)}g</span>
        <span class="text-xs text-orange-400">F ${num(m.fat,1)}g</span>
      </div>
    </div>
    <div class="flex items-center gap-1 shrink-0">
      <button data-edit="${m.id}"
        class="btn-active text-slate-600 hover:text-indigo-400 p-2 rounded-xl hover:bg-indigo-400/10 transition-colors"
        title="Bearbeiten">
        ${iconEdit(16)}
      </button>
      <button data-del="${m.id}"
        class="btn-active text-slate-600 hover:text-red-400 p-2 rounded-xl hover:bg-red-400/10 transition-colors"
        title="Löschen">
        ${iconTrash(16)}
      </button>
    </div>
  </div>`;
}

// ─── SEARCH ────────────────────────────────────────────────
function renderSearch() {
  let content = '';
  if (S.searchState === 'loading') {
    content = `<div class="flex flex-col items-center justify-center py-20 gap-4">
      <div class="w-10 h-10 rounded-full border-2 border-indigo-500 border-t-transparent spin"></div>
      <p class="text-slate-400 text-sm">Suche läuft…</p>
    </div>`;
  } else if (S.searchState === 'error') {
    content = `<div class="mx-4 bg-red-500/10 border border-red-500/20 rounded-2xl p-5 text-center">
      <p class="text-red-400 font-semibold text-sm">Verbindungsfehler</p>
      <p class="text-slate-500 text-xs mt-1">${h(S.searchError)}</p>
    </div>`;
  } else if (S.searchState === 'done' && S.searchResults.length === 0) {
    content = `<div class="text-center py-16">
      <div class="text-4xl mb-3">🔍</div>
      <p class="text-slate-400 font-medium">Keine Ergebnisse</p>
      <p class="text-slate-600 text-xs mt-1">Versuche einen anderen Begriff</p>
    </div>`;
  } else if (S.searchResults.length > 0) {
    const apiBar = S.apiLoading
      ? `<div class="flex items-center gap-2 px-4 py-2 text-slate-500 text-xs">
           <div class="w-3.5 h-3.5 rounded-full border border-indigo-500 border-t-transparent spin shrink-0"></div>
           Online-Datenbank wird durchsucht…
         </div>`
      : (S.searchError
          ? `<div class="mx-4 mb-2 bg-amber-500/10 border border-amber-500/20 rounded-xl px-3 py-2 text-amber-400 text-xs">${h(S.searchError)}</div>`
          : '');
    const hasFavs  = S.searchResults.some(f => f.isFav);
    const hasLocal = S.searchResults.some(f => f.local && !f.isFav);
    const hasApi   = S.searchResults.some(f => !f.local && !f.isFav);
    const sepLocal = hasFavs && hasLocal
      ? `<div class="px-4 pt-3 pb-1"><p class="text-xs font-bold text-slate-600 uppercase tracking-widest">Lokale Datenbank</p></div>`
      : (!hasFavs && hasLocal ? `<div class="px-4 pb-1"><p class="text-xs font-bold text-slate-600 uppercase tracking-widest">Lokale Datenbank</p></div>` : '');
    const sep = hasApi
      ? `<div class="px-4 pt-3 pb-1"><p class="text-xs font-bold text-slate-600 uppercase tracking-widest">Online-Ergebnisse</p></div>`
      : '';
    content = `<div class="pb-4 slide-in">
      ${hasFavs ? `<div class="px-4 pb-1"><p class="text-xs font-bold text-rose-500/80 uppercase tracking-widest">❤️ Favoriten</p></div>` : ''}
      <div class="px-4 space-y-2">${S.searchResults.filter(f=>f.isFav).map(renderFoodCard).join('')}</div>
      ${sepLocal}
      <div class="px-4 space-y-2">${S.searchResults.filter(f=>f.local&&!f.isFav).map(renderFoodCard).join('')}</div>
      ${sep}
      <div class="px-4 space-y-2 mt-2">${S.searchResults.filter(f=>!f.local&&!f.isFav).map(renderFoodCard).join('')}</div>
      ${apiBar}
    </div>`;
  } else if (S.apiLoading) {
    content = `<div class="flex flex-col items-center justify-center py-20 gap-4">
      <div class="w-10 h-10 rounded-full border-2 border-indigo-500 border-t-transparent spin"></div>
      <p class="text-slate-400 text-sm">Suche läuft…</p>
    </div>`;
  } else {
    const allFavs = loadFavorites();
    const favSection = allFavs.length > 0
      ? `<div class="pb-4 slide-in">
          <div class="px-4 pb-1"><p class="text-xs font-bold text-rose-500/80 uppercase tracking-widest">❤️ Favoriten</p></div>
          <div class="px-4 space-y-2">${allFavs.map(f => renderFavCard(f)).join('')}</div>
         </div>`
      : '';
    content = favSection + `<div class="text-center py-10 px-8">
      <div class="text-5xl mb-3">🥦</div>
      <p class="text-slate-300 font-bold text-base">Lebensmittel suchen</p>
      <p class="text-slate-500 text-sm mt-2 leading-relaxed">Tippe oben und suche in der lokalen DB + Open Food Facts</p>
    </div>`;
  }

  return `
  <div class="flex-1 overflow-y-auto pb-28 pt-safe">
    <div class="px-4 pt-6 pb-4">
      <h1 class="text-2xl font-black tracking-tight mb-4">Lebensmittel suchen</h1>
      <div class="relative">
        <input id="search-input" type="search" inputmode="search" autocomplete="off"
          placeholder="z.B. Tofu, Vollkornbrot…"
          value="${h(S.searchQuery)}"
          class="w-full bg-slate-800 border border-slate-700 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 rounded-2xl px-5 py-3.5 pr-14 text-white placeholder-slate-600 outline-none transition-all text-sm"/>
        <button id="btn-search"
          class="btn-active absolute right-2.5 top-1/2 -translate-y-1/2 bg-indigo-600 hover:bg-indigo-500 rounded-xl p-2.5 transition-colors">
          ${iconSearch(18)}
        </button>
      </div>
    </div>
    ${content}
  </div>`;
}

function renderFoodCard(food, _unused) {
  const idx = S.searchResults.indexOf(food);
  const fav = isFavorite(food.name);
  const badge = food.local
    ? `<span class="inline-flex items-center gap-0.5 text-xs bg-emerald-500/15 text-emerald-400 border border-emerald-500/20 px-1.5 py-0.5 rounded-lg font-semibold">🌿 Natürlich</span>`
    : '';
  const favBadge = food.isFav
    ? `<span class="inline-flex items-center gap-0.5 text-xs bg-rose-500/15 text-rose-400 border border-rose-500/20 px-1.5 py-0.5 rounded-lg font-semibold">❤️ Favorit</span>`
    : '';
  return `
  <div class="bg-slate-800/70 rounded-2xl p-4 border border-slate-700/30">
    <div class="flex items-start gap-3">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap mb-0.5">
          <p class="font-semibold text-sm leading-snug">${h(food.name)}</p>
          ${badge}${favBadge}
        </div>
        ${food.brand ? `<p class="text-slate-500 text-xs">${h(food.brand)}</p>` : ''}
        <div class="flex flex-wrap gap-x-3 gap-y-1 mt-2">
          <span class="text-xs font-bold text-amber-400">${food.kcal100} kcal</span>
          <span class="text-xs text-indigo-400">P ${food.protein100}g</span>
          <span class="text-xs text-emerald-400">K ${food.carbs100}g</span>
          <span class="text-xs text-orange-400">F ${food.fat100}g</span>
        </div>
        <p class="text-slate-700 text-xs mt-1">pro 100 g</p>
      </div>
      <div class="flex flex-col gap-2 shrink-0">
        <button data-fav-idx="${idx}"
          class="btn-active rounded-xl w-9 h-9 flex items-center justify-center border transition-colors
            ${fav ? 'bg-rose-500/20 border-rose-500/30 text-rose-400' : 'bg-slate-700 border-slate-600 text-slate-500 hover:text-rose-400'}">
          ${iconHeart(16, fav)}
        </button>
        <button data-add-idx="${idx}"
          class="btn-active bg-indigo-600 hover:bg-indigo-500 rounded-xl w-9 h-9 flex items-center justify-center shadow-md shadow-indigo-900/40">
          ${iconPlus(18)}
        </button>
      </div>
    </div>
  </div>`;
}

// ─── SETTINGS ──────────────────────────────────────────────
function renderSettings() {
  const sf = S.settingsForm;
  const pct = S.settingsMode === 'pct';
  const kcal = sf.kcal || 1;
  const log = loadLog();
  const days = Object.keys(log);
  const allMeals = Object.values(log).flat();
  const avgKcal = allMeals.length && days.length
    ? Math.round(allMeals.reduce((a,m) => a + (+m.kcal||0), 0) / days.length) : 0;

  // Werte für die Anzeige (g oder %)
  const dispProtein = pct ? Math.round(sf.protein * 4 / kcal * 100) : sf.protein;
  const dispCarbs   = pct ? Math.round(sf.carbs   * 4 / kcal * 100) : sf.carbs;
  const dispFat     = pct ? Math.round(sf.fat     * 9 / kcal * 100) : sf.fat;
  const totalPct    = pct ? dispProtein + dispCarbs + dispFat : null;
  const pctWarn     = totalPct !== null && Math.abs(totalPct - 100) > 2;

  return `
  <div class="flex-1 overflow-y-auto pb-28 pt-safe">
    <div class="px-5 pt-6 pb-4">
      <h1 class="text-2xl font-black tracking-tight mb-0.5">Tagesziele</h1>
      <p class="text-slate-500 text-sm">Passe deine täglichen Nährwertziele an</p>
    </div>

    <!-- Goals Card -->
    <div class="mx-4 bg-slate-800/70 rounded-3xl p-5 border border-slate-700/30 space-y-4">
      ${settingsRow('Kalorien', 'kcal', sf.kcal, 'kcal', '#fbbf24', 0)}
      <div class="flex items-center justify-between">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Makros</p>
        <div class="flex bg-slate-900 rounded-xl p-0.5 gap-0.5">
          <button id="sfm-g"
            class="btn-active px-3 py-1 rounded-lg text-xs font-bold transition-colors
              ${!pct ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-300'}">
            g
          </button>
          <button id="sfm-pct"
            class="btn-active px-3 py-1 rounded-lg text-xs font-bold transition-colors
              ${pct ? 'bg-indigo-600 text-white shadow' : 'text-slate-500 hover:text-slate-300'}">
            %
          </button>
        </div>
      </div>
      ${pct ? `<p class="text-xs text-slate-500 -mt-2">Eingabe in %, wird automatisch in Gramm umgerechnet</p>` : ''}
      ${settingsRow('Protein',       'protein', dispProtein, pct ? '%' : 'g', '#818cf8', 4)}
      ${settingsRow('Kohlenhydrate', 'carbs',   dispCarbs,   pct ? '%' : 'g', '#34d399', 4)}
      ${settingsRow('Fett',          'fat',     dispFat,     pct ? '%' : 'g', '#fb923c', 9)}
      ${pct ? `
      <div class="bg-slate-900/60 rounded-2xl px-4 py-3 text-xs space-y-1">
        <div class="flex justify-between">
          <span class="text-slate-500">Summe</span>
          <span class="font-bold ${pctWarn ? 'text-amber-400' : 'text-emerald-400'}">${totalPct}%  ${pctWarn ? '⚠️ ≠ 100%' : '✓'}</span>
        </div>
        <div class="flex justify-between text-slate-600">
          <span>→ Protein</span><span>${sf.protein} g</span>
        </div>
        <div class="flex justify-between text-slate-600">
          <span>→ Kohlenhydrate</span><span>${sf.carbs} g</span>
        </div>
        <div class="flex justify-between text-slate-600">
          <span>→ Fett</span><span>${sf.fat} g</span>
        </div>
      </div>` : ''}
    </div>

    <div class="mx-4 mt-3">
      <button id="btn-save-settings"
        class="btn-active w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl text-base shadow-lg shadow-indigo-900/30 transition-colors">
        Ziele speichern
      </button>
    </div>

    <!-- Stats -->
    <div class="mx-4 mt-5 bg-slate-800/70 rounded-3xl p-5 border border-slate-700/30">
      <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Statistik</p>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-slate-700/50 rounded-2xl p-3.5">
          <p class="text-slate-400 text-xs mb-1">Erfasste Tage</p>
          <p class="text-2xl font-black">${days.length}</p>
        </div>
        <div class="bg-slate-700/50 rounded-2xl p-3.5">
          <p class="text-slate-400 text-xs mb-1">Ø Kcal / Tag</p>
          <p class="text-2xl font-black text-indigo-400">${avgKcal || '–'}</p>
        </div>
        <div class="bg-slate-700/50 rounded-2xl p-3.5">
          <p class="text-slate-400 text-xs mb-1">Mahlzeiten gesamt</p>
          <p class="text-2xl font-black text-emerald-400">${allMeals.length}</p>
        </div>
        <div class="bg-slate-700/50 rounded-2xl p-3.5">
          <p class="text-slate-400 text-xs mb-1">Heute</p>
          <p class="text-2xl font-black text-amber-400">${getTodayMeals().length}</p>
        </div>
      </div>
    </div>

    <!-- Danger Zone -->
    <div class="mx-4 mt-4 mb-4 bg-red-950/20 rounded-3xl p-5 border border-red-900/30">
      <p class="text-red-400 font-bold text-sm mb-1">Gefahrenzone</p>
      <p class="text-slate-500 text-xs mb-3">Löscht alle Mahlzeiten und Einstellungen dauerhaft.</p>
      <button id="btn-reset"
        class="btn-active w-full bg-red-600/15 hover:bg-red-600/25 text-red-400 font-semibold py-3 rounded-xl text-sm border border-red-600/20 transition-colors">
        Alle Daten löschen
      </button>
    </div>
  </div>`;
}

function settingsRow(label, key, val, unit, color, calFactor) {
  return `
  <div class="flex items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <div class="w-2 h-9 rounded-full shrink-0" style="background:${color}"></div>
      <div>
        <p class="font-semibold text-sm">${label}</p>
        <p class="text-slate-600 text-xs">täglich</p>
      </div>
    </div>
    <div class="flex items-center gap-2 shrink-0">
      <input type="number" inputmode="decimal" id="sf_${key}" value="${val}" min="0"
        data-sf="${key}" data-sfcal="${calFactor}"
        class="w-20 bg-slate-700 border border-slate-600 focus:border-indigo-500 rounded-xl px-2 py-2 text-center font-bold text-white outline-none text-sm"/>
      <span class="text-slate-500 text-xs w-8">${unit}</span>
    </div>
  </div>`;
}

// ─── MODALS ─────────────────────────────────────────────────
function renderFoodModal() {
  const food = S.searchResults[S.selectedFoodIdx];
  if (!food) return '';
  const g = S.selectedGrams;
  const f = g / 100;
  return `
  <div id="food-modal-bg" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-end">
    <div class="modal-enter w-full max-w-md mx-auto bg-slate-800 rounded-t-3xl shadow-2xl border-t border-slate-700/50">
      <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mt-4 mb-5"></div>
      <div class="px-6 pb-6">
        <h2 class="font-black text-lg leading-snug mb-0.5 line-clamp-2">${h(food.name)}</h2>
        ${food.brand ? `<p class="text-slate-500 text-sm mb-4">${h(food.brand)}</p>` : '<div class="mb-4"></div>'}

        <!-- Grams picker -->
        <p class="text-slate-400 text-xs mb-2 font-medium">Menge in Gramm</p>
        <div class="flex items-center gap-3 mb-5">
          <button id="btn-g-dec"
            class="btn-active bg-slate-700 hover:bg-slate-600 w-11 h-11 rounded-xl font-black text-xl transition-colors flex items-center justify-center">−</button>
          <input type="number" id="grams-inp" inputmode="decimal" value="${g}" min="1" max="9999"
            class="flex-1 bg-slate-700 border border-slate-600 focus:border-indigo-500 rounded-xl py-3 text-center font-bold text-white outline-none text-base"/>
          <button id="btn-g-inc"
            class="btn-active bg-slate-700 hover:bg-slate-600 w-11 h-11 rounded-xl font-black text-xl transition-colors flex items-center justify-center">+</button>
        </div>

        <!-- Preview grid -->
        <div id="food-preview" class="grid grid-cols-4 gap-2 bg-slate-700/40 rounded-2xl p-4 mb-5">
          ${foodPreviewCells(food, f)}
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button id="btn-modal-cancel"
            class="btn-active bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3.5 rounded-2xl transition-colors">Abbrechen</button>
          <button id="btn-modal-add"
            class="btn-active bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-indigo-900/30 transition-colors">Hinzufügen</button>
        </div>
      </div>
    </div>
  </div>`;
}

function foodPreviewCells(food, f) {
  return `
    <div class="text-center">
      <p id="prev-kcal" class="text-amber-400 font-black text-lg">${num(food.kcal100*f)}</p>
      <p class="text-slate-500 text-xs mt-0.5">kcal</p>
    </div>
    <div class="text-center">
      <p id="prev-prot" class="text-indigo-400 font-black text-lg">${num(food.protein100*f,1)}</p>
      <p class="text-slate-500 text-xs mt-0.5">Prot. g</p>
    </div>
    <div class="text-center">
      <p id="prev-carb" class="text-emerald-400 font-black text-lg">${num(food.carbs100*f,1)}</p>
      <p class="text-slate-500 text-xs mt-0.5">KH g</p>

function updateMealInLog(id, newGrams) {
  const log = loadLog();
  const d = getToday();
  if (!log[d]) return;
  const meal = log[d].find(m => m.id === id);
  if (!meal) return;
  const f = newGrams / 100;
  meal.grams   = newGrams;
  meal.kcal    = num((meal.kcal100    || 0) * f);
  meal.protein = num((meal.protein100 || 0) * f, 1);
  meal.carbs   = num((meal.carbs100   || 0) * f, 1);
  meal.fat     = num((meal.fat100     || 0) * f, 1);
  saveLogData(log);
  S.dashNutrients = null;
  if (meal.sbId) getSB()?.from('eintraege').update({ menge_gramm: newGrams }).eq('id', meal.sbId).catch(() => {});
}

function renderWeightView() {
  const log = loadWeightLog();
  const today = getToday();
  const todayEntry = log.find(e => e.date === today);
  const recent = log.slice(0, 30);

  // SVG Sparkline chart
  let chartHtml = '';
  if (recent.length >= 2) {
    const reversed = [...recent].reverse();
    const vals = reversed.map(e => e.kg);
    const minV = Math.min(...vals) - 0.5;
    const maxV = Math.max(...vals) + 0.5;
    const W = 300, H = 80;
    const toX = i => (i / (vals.length - 1)) * W;
    const toY = v => H - ((v - minV) / (maxV - minV)) * H;
    const pts = vals.map((v, i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
    const dots = vals.map((v, i) => `<circle cx="${toX(i).toFixed(1)}" cy="${toY(v).toFixed(1)}" r="3.5" fill="#818cf8"/>`).join('');
    const lastV = vals[vals.length - 1];
    const firstV = vals[0];
    const diff = +(lastV - firstV).toFixed(1);
    const diffColor = diff < 0 ? 'text-emerald-400' : diff > 0 ? 'text-rose-400' : 'text-slate-400';
    const diffLabel = diff === 0 ? '±0 kg' : (diff > 0 ? `+${diff} kg` : `${diff} kg`);
    chartHtml = `
    <div class="mx-4 mt-3 bg-slate-800/70 rounded-3xl p-5 border border-slate-700/30">
      <div class="flex items-center justify-between mb-4">
        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Verlauf (${recent.length} Tage)</p>
        <span class="font-bold text-sm ${diffColor}">${diffLabel}</span>
      </div>
      <svg viewBox="0 0 ${W} ${H}" class="w-full" style="height:80px">
        <polyline points="${pts}" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${dots}
      </svg>
      <div class="flex justify-between text-xs text-slate-600 mt-2">
        <span>${reversed[0].date.slice(5).replace('-','.')}</span>
        <span class="font-bold text-indigo-400">${lastV} kg</span>
        <span>${reversed[reversed.length-1].date.slice(5).replace('-','.')}</span>
      </div>
    </div>`;
  }

  return `
  <div class="flex-1 overflow-y-auto pb-28 pt-safe">
    <div class="px-5 pt-6 pb-2">
      <h1 class="text-2xl font-black tracking-tight">Körpergewicht</h1>

    </div>

    <!-- Eingabe -->
    <div class="mx-4 mt-3 bg-slate-800/70 rounded-3xl p-5 border border-slate-700/30">
      <p class="text-slate-400 text-sm font-medium mb-3">Heutiges Gewicht eintragen</p>
      <div class="flex items-center gap-3">
        <input id="weight-inp" type="number" inputmode="decimal" step="0.1" min="20" max="300"
          value="${todayEntry ? todayEntry.kg : ''}"
          placeholder="z.B. 75.5"
          class="flex-1 bg-slate-700 border border-slate-600 focus:border-indigo-500 rounded-2xl px-4 py-3.5 text-white font-bold text-lg outline-none placeholder-slate-600"/>
        <span class="text-slate-400 font-semibold shrink-0">kg</span>
        <button id="btn-save-weight"
          class="btn-active bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-5 py-3.5 rounded-2xl shadow-lg shadow-indigo-900/30 shrink-0">
          Speichern
        </button>
      </div>
      ${todayEntry ? `<p class="text-emerald-400 text-xs mt-2 font-medium">✓ Heute eingetragen: ${todayEntry.kg} kg</p>` : ''}
    </div>

    ${chartHtml}

    <!-- History -->
    <div class="mx-4 mt-3">
      ${recent.length === 0
        ? `<div class="text-center py-12">
            <div class="text-4xl mb-2">⚖️</div>
            <p class="text-slate-400 font-medium">Noch keine Einträge</p>
            <p class="text-slate-600 text-xs mt-1">Trage dein Gewicht oben ein</p>
           </div>`
        : `<p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Einträge</p>
           <div class="space-y-2 slide-in">
             ${recent.map(e => {
               const d = new Date(e.date + 'T12:00:00');
               const label = d.toLocaleDateString('de-DE', { weekday:'short', day:'numeric', month:'short' });
               return `

function renderHistoryWeek() {
  if (!S.historyWeekData) return `<div class="text-center py-12 text-slate-500 text-sm">Lade Wochendaten…</div>`;
  const data = S.historyWeekData;
  const sg = S.settings;
  const today = getToday();
  const DAY_NAMES = ['Mo','Di','Mi','Do','Fr','Sa','So'];

  // SVG bar chart
  const W = 300, H = 110, BAR_W = 28, GAP = (W - 7*BAR_W) / 8;
  const maxKcal = Math.max(...data.map(d => d.totals.kcal), sg.kcal, 1);
  const goalLineY = H - (sg.kcal / maxKcal) * H;

  const bars = data.map((d, i) => {
    const barH = (d.totals.kcal / maxKcal) * H;
    const x = GAP + i * (BAR_W + GAP);
    const y = H - barH;
    const isToday = d.date === today;
    const over = d.totals.kcal > sg.kcal;
    const color = d.totals.kcal === 0 ? '#1e293b' : over ? '#ef4444' : isToday ? '#818cf8' : '#334155';
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${BAR_W}" height="${Math.max(barH,2).toFixed(1)}" rx="4" fill="${color}"/>
      <text x="${(x+BAR_W/2).toFixed(1)}" y="${(H+14).toFixed(1)}" text-anchor="middle" fill="${isToday?'#818cf8':'#64748b'}" font-size="10" font-family="-apple-system,sans-serif" font-weight="${isToday?'700':'400'}">${DAY_NAMES[i]}</text>
      ${d.totals.kcal > 0 ? `<text x="${(x+BAR_W/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" fill="${over?'#f87171':'#94a3b8'}" font-size="8" font-family="-apple-system,sans-serif">${num(d.totals.kcal)}</text>` : ''}`;
  }).join('');

  const totalKcal = data.reduce((a, d) => a + d.totals.kcal, 0);
  const daysWithData = data.filter(d => d.totals.kcal > 0).length;
  const avgKcal = daysWithData ? Math.round(totalKcal / daysWithData) : 0;

  return `
  <!-- Week Chart -->
  <div class="mx-4 mb-3 bg-slate-800/70 rounded-2xl p-4 border border-slate-700/30">
    <div class="flex items-center justify-between mb-3">
      <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Wochenübersicht</p>
      <span class="text-xs text-slate-400 font-semibold">Ø ${avgKcal || '–'} kcal</span>
    </div>
    <svg viewBox="0 0 ${W} ${H+20}" class="w-full" style="height:96px">
      <line x1="0" y1="${goalLineY.toFixed(1)}" x2="${W}" y2="${goalLineY.toFixed(1)}" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
      <text x="${W-2}" y="${(goalLineY-3).toFixed(1)}" text-anchor="end" fill="#818cf8" font-size="8" font-family="-apple-system,sans-serif">Ziel</text>
      ${bars}
    </svg>
  </div>

  <!-- Daily Cards -->
  <div class="mx-4 mb-4 space-y-2">
    ${data.map(d => {
      const isToday = d.date === today;
      const dDate = new Date(d.date+'T12:00:00');
      const label = dDate.toLocaleDateString('de-DE', { weekday:'short', day:'numeric', month:'short' });
      const calPct = Math.min(d.totals.kcal / Math.max(sg.kcal, 1), 1);
      const over = d.totals.kcal > sg.kcal;
      return `
      <div class="bg-slate-800/70 rounded-2xl px-4 py-3 border ${isToday?'border-indigo-500/40':'border-slate-700/30'} btn-active cursor-pointer"
           data-hist-day="${h(d.date)}">
        <div class="flex items-center justify-between">
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-sm ${isToday?'text-indigo-400':''}">
              ${h(label)}${isToday?' <span class="text-xs font-normal text-indigo-400/70">Heute</span>':''}
            </p>
            <div class="flex items-center gap-3 mt-1 flex-wrap">
              <span class="text-amber-400 text-xs font-bold">${d.totals.kcal ? num(d.totals.kcal)+' kcal' : '–'}</span>
              ${d.totals.protein ? `<span class="text-indigo-400 text-xs">P ${num(d.totals.protein,1)}g</span>` : ''}
              ${d.weight ? `<span class="text-teal-400 text-xs">⚖ ${d.weight} kg</span>` : ''}
            </div>
            ${d.totals.kcal > 0 ? `
            <div class="w-full h-1 bg-slate-700 rounded-full overflow-hidden mt-2">
              <div class="h-full rounded-full" style="width:${(calPct*100).toFixed(0)}%;background:${over?'#ef4444':'#818cf8'}"></div>
            </div>` : ''}
          </div>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="text-slate-600 shrink-0 ml-3"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  ICONS (SVG inline)
// ═══════════════════════════════════════════════════════════
const ico = (p, w=22) => `<svg width="${w}" height="${w}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

function iconPlus(w)        { return ico('<path stroke-width="2.5" d="M12 4v16m8-8H4"/>', w); }
function iconTrash(w)       { return ico('<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>', w); }
function iconSearch(w)      { return ico('<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>', w); }
function iconHome(w)        { return ico('<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>', w); }
function iconGear(w)        { return ico('<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/>', w); }
function iconHeart(w, fill) {
  const f = fill ? '#e11d48' : 'none';
  const s = fill ? '#e11d48' : 'currentColor';
  return `<svg width="${w}" height="${w}" fill="${f}" stroke="${s}" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>`;
}
function iconScale(w)    { return ico('<path d="M3 6l9-4 9 4M3 6v12l9 4 9-4V6M12 2v20M3 12h18"/>', w); }
function iconCalendar(w) { return ico('<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>', w); }
function iconEdit(w)     { return ico('<path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>', w); }

// ═══════════════════════════════════════════════════════════
//  EVENT BINDING
// ═══════════════════════════════════════════════════════════
function bind() {
  // ── Bottom Nav ──
  document.querySelectorAll('[data-nav]').forEach(b => {
    b.addEventListener('click', () => {
      S.view = b.dataset.nav;
      if (S.view === 'settings') { S.settingsForm = { ...S.settings }; S.settingsMode = 'g'; }
      render();
    });
  });

  // ── Dashboard ──
  qs('#dash-save-weight')?.addEventListener('click', () => {
    const v = parseFloat(qs('#dash-weight-inp')?.value);
    if (!v || isNaN(v) || v < 20 || v > 500) { showToast('Bitte gültiges Gewicht eingeben', '#dc2626'); return; }
    addWeightEntry(+v.toFixed(1));
    showToast(`${v.toFixed(1)} kg gespeichert ✓`, '#059669');
    render();
  });
  qs('#dash-weight-inp')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') qs('#dash-save-weight')?.click();
  });

  const dashSearch = $('btn-dash-search');
  if (dashSearch) dashSearch.addEventListener('click', () => { S.view = 'search'; render(); setTimeout(() => $('search-input')?.focus(), 60); });

  const fabAdd = $('btn-add-fab');
  if (fabAdd) fabAdd.addEventListener('click', openManualModal);

  document.querySelectorAll('[data-del]').forEach(b => {
    b.addEventListener('click', async () => {
      await deleteMealFromLog(+b.dataset.del);
      render();
    });
  });

  document.querySelectorAll('[data-edit]').forEach(b => {
    b.addEventListener('click', () => {
      const id = +b.dataset.edit;
      const log = loadLog();
      const meal = (log[getToday()] || []).find(m => m.id === id);
      if (!meal) return;
      S.editMealId = id;
      S.editMealGrams = meal.grams || 100;
      S.showEditModal = true;
      render();
    });
  });

  // ── Search ──
  const sinp = $('search-input');
  if (sinp) {
    sinp.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(sinp.value); });
    sinp.addEventListener('input',   e => { S.searchQuery = e.target.value; });
  }
  const sbtn = $('btn-search');
  if (sbtn) sbtn.addEventListener('click', () => {
    const v = $('search-input')?.value || S.searchQuery;
    doSearch(v);
  });

  document.querySelectorAll('[data-add-idx]').forEach(b => {
    b.addEventListener('click', () => {
      const idx = +b.dataset.addIdx;
      S.selectedFoodIdx = idx;
      S.selectedGrams = Math.max(S.searchResults[idx]?.serving || 100, 1);
      S.showFoodModal = true;
      render();
    });
  });

  // ── Food Modal ──
  const ginp = $('grams-inp');
  if (ginp) {
    ginp.addEventListener('input', e => {
      const v = parseInt(e.target.value);
      if (v > 0) { S.selectedGrams = v; updateFoodPreview(); }
    });
  }
  const gdec = $('btn-g-dec');
  if (gdec) gdec.addEventListener('click', () => {
    S.selectedGrams = Math.max(1, S.selectedGrams - 10);
    const inp = $('grams-inp'); if (inp) inp.value = S.selectedGrams;
    updateFoodPreview();
  });
  const ginc = $('btn-g-inc');
  if (ginc) ginc.addEventListener('click', () => {
    S.selectedGrams += 10;
    const inp = $('grams-inp'); if (inp) inp.value = S.selectedGrams;
    updateFoodPreview();
  });

  const mcancel = $('btn-modal-cancel');
  if (mcancel) mcancel.addEventListener('click', closeFoodModal);

  const mbg = $('food-modal-bg');
  if (mbg) mbg.addEventListener('click', e => { if (e.target === mbg) closeFoodModal(); });

  const madd = $('btn-modal-add');
  if (madd) madd.addEventListener('click', commitFoodAdd);

  // ── Edit Meal Modal ──
  const editBg = $('edit-modal-bg');
  if (editBg) editBg.addEventListener('click', e => { if (e.target === editBg) { S.showEditModal = false; render(); } });

  $('btn-edit-cancel')?.addEventListener('click', () => { S.showEditModal = false; render(); });

  const editInp = $('edit-grams-inp');
  if (editInp) {
    editInp.addEventListener('input', e => {
      const v = parseInt(e.target.value);
      if (v > 0) { S.editMealGrams = v; updateEditPreview(); }
    });
  }
  $('btn-edit-dec')?.addEventListener('click', () => {
    S.editMealGrams = Math.max(1, S.editMealGrams - 10);
    const inp = $('edit-grams-inp'); if (inp) inp.value = S.editMealGrams;
    updateEditPreview();
  });
  $('btn-edit-inc')?.addEventListener('click', () => {
    S.editMealGrams += 10;
    const inp = $('edit-grams-inp'); if (inp) inp.value = S.editMealGrams;
    updateEditPreview();
  });
  $('btn-edit-save')?.addEventListener('click', () => {
    const g = Math.max(1, parseInt($('edit-grams-inp')?.value) || S.editMealGrams);
    updateMealInLog(S.editMealId, g);
    S.showEditModal = false;
    showToast('Eintrag aktualisiert ✓', '#059669');
    render();
  });

  // ── Manual Modal ──
  const mmancancel = $('btn-man-cancel');
  if (mmancancel) mmancancel.addEventListener('click', closeManualModal);

  const manbg = $('manual-modal-bg');
  if (manbg) manbg.addEventListener('click', e => { if (e.target === manbg) closeManualModal(); });

  const manadd = $('btn-man-add');
  if (manadd) manadd.addEventListener('click', commitManualAdd);

  // ── Settings Modus-Toggle (g / %) ──
  $('sfm-g')?.addEventListener('click', () => { S.settingsMode = 'g'; render(); });
  $('sfm-pct')?.addEventListener('click', () => { S.settingsMode = 'pct'; render(); });

  // ── Settings Inputs ──
  document.querySelectorAll('[data-sf]').forEach(inp => {
    inp.addEventListener('input', e => {
      const key = e.target.dataset.sf;
      const calFactor = parseFloat(e.target.dataset.sfcal) || 0;
      let v = parseFloat(e.target.value) || 0;
      // Im %-Modus: Prozentwert → Gramm umrechnen (Kalorien bleibt immer als kcal)
      if (S.settingsMode === 'pct' && calFactor > 0) {
        v = Math.round(v / 100 * (S.settingsForm.kcal || 0) / calFactor);
      }
      S.settingsForm[key] = Math.max(0, v);
      // Live-Preview der Gramm-Werte aktualisieren (ohne vollen Re-Render)
      if (S.settingsMode === 'pct') render();
    });
  });

  const savebtn = $('btn-save-settings');
  if (savebtn) savebtn.addEventListener('click', () => {
    S.settings = { ...S.settingsForm };
    saveSettingsData(S.settings);
    savebtn.textContent = '✓ Gespeichert!';
    savebtn.classList.replace('bg-indigo-600','bg-emerald-600');
    savebtn.classList.replace('hover:bg-indigo-500','hover:bg-emerald-500');
    showToast('Ziele gespeichert!', '#059669');
    setTimeout(render, 1500);
  });

  const resetbtn = $('btn-reset');
  if (resetbtn) resetbtn.addEventListener('click', () => {
    if (!confirm('Wirklich ALLE Daten löschen?\nDies kann nicht rückgängig gemacht werden.')) return;
    localStorage.removeItem(KEYS.SETTINGS);
    localStorage.removeItem(KEYS.LOG);
    S.settings = { ...DEFAULT_SETTINGS };
    S.settingsForm = { ...DEFAULT_SETTINGS };
    S.view = 'dashboard';
    showToast('Alle Daten gelöscht', '#dc2626');
    render();
  });

  // ── Favoriten (Herz-Button in Suchergebnissen) ──
  document.querySelectorAll('[data-fav-idx]').forEach(b => {
    b.addEventListener('click', () => {
      const food = S.searchResults[+b.dataset.favIdx];
      if (food) { toggleFavorite(food); render(); setTimeout(() => { const inp = $('search-input'); if (inp) inp.value = S.searchQuery; }, 20); }
    });
  });
  // Favorit entfernen aus der Favoriten-Sektion (idle)
  document.querySelectorAll('[data-fav-remove]').forEach(b => {
    b.addEventListener('click', () => {
      const name = b.dataset.favRemove;
      let favs = loadFavorites();
      saveFavorites(favs.filter(f => f.name !== name));
      showToast('Favorit entfernt', '#64748b');
      render();
    });
  });
  // Favorit direkt hinzufügen aus der Favoriten-Sektion (idle)
  document.querySelectorAll('[data-fav-add-food]').forEach(b => {
    b.addEventListener('click', () => {
      const name = b.dataset.favAddFood;
      const food = loadFavorites().find(f => f.name === name);
      if (!food) return;
      // Füge food zu searchResults hinzu und öffne Modal
      if (!S.searchResults.find(f => f.name === food.name)) S.searchResults.unshift({ ...food, isFav: true });
      const idx = S.searchResults.findIndex(f => f.name === food.name);
      S.selectedFoodIdx = idx;
      S.selectedGrams = Math.max(food.serving || 100, 1);
      S.showFoodModal = true;
      render();
    });
  });

  // ── Gewicht (eigene View) ──
  const saveWeightBtn = $('btn-save-weight');
  if (saveWeightBtn) saveWeightBtn.addEventListener('click', () => {
    const v = parseFloat($('weight-inp')?.value);
    if (!v || isNaN(v) || v < 20 || v > 500) { showToast('Bitte gültiges Gewicht eingeben', '#dc2626'); return; }
    addWeightEntry(+v.toFixed(1));
    showToast(`${v.toFixed(1)} kg gespeichert ✓`, '#059669');
    render();
  });
  document.querySelectorAll('[data-del-weight]').forEach(b => {
    b.addEventListener('click', () => {
      deleteWeightEntry(b.dataset.delWeight);
      render();
    });
  });

  // ── History ──
  qs('#hist-day-btn')?.addEventListener('click', () => {
    if (S.historyMode !== 'day') { S.historyMode = 'day'; S.historyData = null; loadDayData(S.historyDate); }
  });
  qs('#hist-week-btn')?.addEventListener('click', () => {
    if (S.historyMode !== 'week') { S.historyMode = 'week'; S.historyWeekData = null; loadWeekData(S.historyDate); }
  });
  qs('#hist-prev')?.addEventListener('click', () => {
    const d = new Date(S.historyDate + 'T12:00:00');
    if (S.historyMode === 'day') {
      d.setDate(d.getDate() - 1);
      loadDayData(d.toISOString().slice(0, 10));
    } else {
      d.setDate(d.getDate() - 7);
      S.historyWeekData = null;
      loadWeekData(d.toISOString().slice(0, 10));
    }
  });
  qs('#hist-next')?.addEventListener('click', () => {
    const d = new Date(S.historyDate + 'T12:00:00');
    const today = getToday();
    if (S.historyMode === 'day') {
      d.setDate(d.getDate() + 1);
      const next = d.toISOString().slice(0, 10);
      if (next <= today) loadDayData(next);
    } else {
      d.setDate(d.getDate() + 7);
      const next = d.toISOString().slice(0, 10);
      if (getWeekDates(next)[0] <= today) { S.historyWeekData = null; loadWeekData(next); }
    }
  });
  // Click day card in week view → drill to day
  document.querySelectorAll('[data-hist-day]').forEach(b => {
    b.addEventListener('click', () => {
      S.historyMode = 'day';
      S.historyData = null;
      loadDayData(b.dataset.histDay);
    });
  });
  // Weight save in history day view
  qs('#hist-save-weight')?.addEventListener('click', () => {
    const v = parseFloat(qs('#hist-weight-inp')?.value);
    if (!v || isNaN(v) || v < 20 || v > 500) { showToast('Bitte gültiges Gewicht eingeben', '#dc2626'); return; }
    const kg = +v.toFixed(1);
    const log = loadWeightLog();
    const filtered = log.filter(e => e.date !== S.historyDate);
    filtered.push({ date: S.historyDate, kg });
    filtered.sort((a, b) => b.date.localeCompare(a.date));
    saveWeightLog(filtered.slice(0, 90));
    const sb = getSB();
    if (sb) sb.from('gewicht').upsert({ datum: S.historyDate, gewicht_kg: kg }, { onConflict: 'datum' }).catch(() => {});
    showToast(`${kg} kg gespeichert ✓`, '#059669');
    render();
  });

  // ── Dashboard Expand ──
  qs('#dash-expand-btn')?.addEventListener('click', () => {
    S.dashExpanded = !S.dashExpanded;
    if (S.dashExpanded && !S.dashNutrients) {
      render(); // show spinner
      calcAllNutrients(getTodayMeals()).then(n => { S.dashNutrients = n; render(); });
    } else {
      render();
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════════════
function closeFoodModal() {
  S.showFoodModal = false;
  S.selectedFoodIdx = -1;
  render();
}

function commitFoodAdd() {
  const food = S.searchResults[S.selectedFoodIdx];
  if (!food) return;
  const g = Math.max(+($('grams-inp')?.value) || S.selectedGrams, 1);
  const f = g / 100;
  addMealToLog({
    name:       food.name,
    kcal:       num(food.kcal100    * f),
    protein:    num(food.protein100 * f, 1),
    carbs:      num(food.carbs100   * f, 1),
    fat:        num(food.fat100     * f, 1),
    grams:      g,
    kcal100:    food.kcal100,
    protein100: food.protein100,
    lmId:       food.sbId || null,   // pass lebensmittel ID immediately — no async wait
    carbs100:   food.carbs100,
    fat100:     food.fat100,
  });
  S.showFoodModal = false;
  S.selectedFoodIdx = -1;
  S.view = 'dashboard';
  showToast(`${food.name.substring(0,24)} hinzugefügt ✓`);
  render();
}

function openManualModal() {
  S.manualForm = { name:'', kcal:'', protein:'', carbs:'', fat:'', grams:'' };
  S.showManualModal = true;
  render();
  setTimeout(() => $('mn-name')?.focus(), 50);
}

function closeManualModal() {
  S.showManualModal = false;
  render();
}

function commitManualAdd() {
  const name = $('mn-name')?.value?.trim();
  const kcal = parseFloat($('mn-kcal')?.value);
  if (!name)       { showToast('Bitte einen Namen eingeben', '#dc2626'); return; }
  if (!kcal || isNaN(kcal)) { showToast('Bitte Kalorien eingeben', '#dc2626'); return; }
  const grams   = parseFloat($('mn-grams')?.value)   || null;
  const protein = parseFloat($('mn-protein')?.value) || 0;
  const carbs   = parseFloat($('mn-carbs')?.value)   || 0;
  const fat     = parseFloat($('mn-fat')?.value)     || 0;
  const g = grams || 100; const ratio = g / 100;
  addMealToLog({
    name, kcal, protein, carbs, fat, grams,
    kcal100:    Math.round(kcal    / ratio),
    protein100: +(protein / ratio).toFixed(1),
    carbs100:   +(carbs   / ratio).toFixed(1),
    fat100:     +(fat     / ratio).toFixed(1),
  });
  S.showManualModal = false;
  showToast(`${name.substring(0,24)} hinzugefügt ✓`);
  render();
}

async function doSearch(query) {
  query = (query || '').trim();
  if (!query) return;
  S.searchQuery = query;
  S.searchError = '';

  const q = query.toLowerCase();
  const favHits = loadFavorites()
    .filter(f => f.name.toLowerCase().includes(q) || (f.tags||'').toLowerCase().includes(q))
    .map(f => ({ ...f, isFav: true }));
  const favNames = new Set(favHits.map(f => f.name.toLowerCase()));

  // 1. Show favorites immediately
  S.searchResults = [...favHits];
  S.searchState = 'loading';
  S.apiLoading = false;
  render();
  setTimeout(() => { const inp = $('search-input'); if (inp) inp.value = S.searchQuery; }, 20);

  // 2. Search Supabase (primary source — 7140 BLS foods)
  let sbHits = await searchSupabase(query);
  sbHits = sbHits.filter(f => !favNames.has(f.name.toLowerCase()));

  // 3. If Supabase offline/empty, fall back to local NATURAL_FOODS
  if (sbHits.length === 0) {
    const localHits = searchLocalFoods(query);
    sbHits = localHits.filter(f => !favNames.has(f.name.toLowerCase()));
  }

  S.searchResults = [...favHits, ...sbHits];
  S.searchState = 'done';

  // 4. Only call OpenFoodFacts if Supabase returned fewer than 3 results
  if (sbHits.length < 3) {
    S.apiLoading = true;
    render();
    setTimeout(() => { const inp = $('search-input'); if (inp) inp.value = S.searchQuery; }, 20);
    try {
      const apiResults = await searchFoods(query);
      const allNames = new Set(S.searchResults.map(f => f.name.toLowerCase()));
      const fresh = apiResults.filter(a => !allNames.has(a.name.toLowerCase()));
      S.searchResults = [...favHits, ...sbHits, ...fresh];
    } catch (e) {
      if (sbHits.length === 0)
        S.searchError = e.name === 'AbortError' ? 'Online-Suche: Zeitüberschreitung.' : 'Online-Suche nicht verfügbar.';
    }
    S.apiLoading = false;
  }

  if (S.searchResults.length === 0) showToast(`Keine Ergebnisse für „${query}"`, '#6b7280');
  render();
  setTimeout(() => { const inp = $('search-input'); if (inp) inp.value = S.searchQuery; }, 20);
}

// ═══════════════════════════════════════════════════════════
//  INIT & SERVICE WORKER
// ═══════════════════════════════════════════════════════════

// Inline Service Worker for offline support (caches this HTML page & API calls)
if ('serviceWorker' in navigator) {
  const swCode = `
    const V = 'kal-v3';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(V).then(c => c.addAll([location.pathname])).then(() => self.skipWaiting()));
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==V).map(k=>caches.delete(k)))).then(()=>clients.claim()));
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      if (e.request.url.includes('supabase.co')) return;
      const isAPI = e.request.url.includes('openfoodfacts.org');
      e.respondWith(
        caches.open(V).then(cache =>
          cache.match(e.request).then(cached => {
            const fresh = fetch(e.request).then(res => {
              if (res.ok) cache.put(e.request, res.clone());
              return res;
            }).catch(() => cached);
            return isAPI ? (cached || fresh) : (fresh.catch(()=>cached) || cached);
          })
        )
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

// Boot
render();
initSupabase();
</script>
